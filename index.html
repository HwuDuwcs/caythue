<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hue Experience</title>
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/ui.css">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<section class="hero">

        <h1>HUẾ</h1>

        <button>Khám phá</button>
    </div>

        <img src="img/hue1.jpg">
    </div>
</section>

<section class="split">
    <div class="text">
        <h2>Vẻ đẹp cổ kính</h2>

    </div>
    <div class="image">
        <img src="img/hue2.jpg">
    </div>
</section>

<section class="cards">
    <div class="card big">
        <h3>Ẩm thực</h3>
    </div>
    <div class="card small">
        <h3>Du lịch</h3>
    </div>
    <div class="card small">
        <h3>Văn hóa</h3>
    </div>
</section>

<section class="banner">
    <h2>Trải nghiệm Huế theo cách của bạn</h2>

<footer class="footer">
    <p>© hxduc &&& lnhat</p>
